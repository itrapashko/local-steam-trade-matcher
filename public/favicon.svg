<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#1b2838"/>

  <!-- Left trading card -->
  <g transform="translate(8 12) rotate(-10 8.5 12.5)">
    <rect width="17" height="25" rx="2.8" fill="#16202d" stroke="#66c0f4" stroke-width="1.5"/>
    <rect x="1.5" y="1.5" width="14" height="18.5" rx="1.2" fill="#2a475e"/>
    <rect x="3" y="21" width="11" height="2" rx=".6" fill="#2a475e"/>
  </g>

  <!-- Right trading card -->
  <g transform="translate(23 12) rotate(10 8.5 12.5)">
    <rect width="17" height="25" rx="2.8" fill="#16202d" stroke="#c6a86a" stroke-width="1.5"/>
    <rect x="1.5" y="1.5" width="14" height="18.5" rx="1.2" fill="#2a475e"/>
    <rect x="3" y="21" width="11" height="2" rx=".6" fill="#2a475e"/>
  </g>

  <!-- Exchange arrows on top, contrasting with cards -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#171a21" stroke-width="6.6">
      <path d="M16 17h16"/>
      <path d="M27 11l5 6-5 6"/>
      <path d="M30 31H14"/>
      <path d="M19 25l-5 6 5 6"/>
    </g>
    <g stroke="#e3e6ed" stroke-width="3.7">
      <path d="M16 17h16"/>
      <path d="M27 11l5 6-5 6"/>
      <path d="M30 31H14"/>
      <path d="M19 25l-5 6 5 6"/>
    </g>
  </g>
</svg>
